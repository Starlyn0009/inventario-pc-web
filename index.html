<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CompuService - Gestión de Inventario</title>
  <meta name="description" content="Sistema MVP CompuService para control de productos.">
  <link rel="stylesheet" href="/src/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">💻 CompuService</div>
      <nav class="tabs-nav">
        <button id="tab-productos" class="tab-btn active">Inventario</button>
        <button id="tab-movimientos" class="tab-btn">Movimientos</button>
      </nav>
    </div>
  </header>
  
  <main>
    <div id="vista-productos" class="vista-activa">
      <section class="top-bar">
        <h1>Inventario de Productos</h1>
        <button id="btn-nuevo-producto" data-testid="btn-nuevo" class="btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Nuevo Producto
        </button>
      </section>

    <!-- Notificaciones Flotantes -->
    <div id="notificacion" class="notificacion"></div>

    <!-- Modal Formulario -->
    <div id="modal-producto" class="modal oculta">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-titulo">Crear Producto</h2>
          <button id="btn-cerrar-modal" class="btn-close">&times;</button>
        </div>
        <form id="formulario-producto">
          <input type="hidden" id="producto-id" />
          
          <div class="form-group">
            <label for="nombre">Nombre del Producto *</label>
            <input type="text" id="nombre" data-testid="input-nombre" required placeholder="Ej: Laptop Dell XPS 13" />
          </div>
          
          <div class="form-group">
            <label for="categoria">Categoría</label>
            <input type="text" id="categoria" data-testid="input-categoria" placeholder="Ej: Laptops, Periféricos" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="precio">Precio ($) *</label>
              <input type="number" step="0.01" min="0.01" id="precio" data-testid="input-precio" required placeholder="0.00" />
            </div>
            
            <div class="form-group">
              <label for="stock">Stock Actual *</label>
              <input type="number" id="stock" min="0" data-testid="input-stock" required placeholder="0" />
            </div>
          </div>
          
          <div class="form-group">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" data-testid="input-descripcion" rows="3" placeholder="Detalles extra del producto..."></textarea>
          </div>

          <div class="form-actions">
            <button type="button" id="btn-cancelar" class="btn-secondary">Cancelar</button>
            <button type="submit" id="btn-guardar" data-testid="btn-guardar" class="btn-primary">Guardar Producto</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Tabla -->
    <section class="table-container">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-productos" data-testid="tabla-productos">
          <tr>
            <td colspan="5" class="estado-tabla">
              <div class="spinner"></div> Cargando productos...
            </td>
          </tr>
        </tbody>
      </table>
    </section>
    </div> <!-- Fin vista productos -->

    <!-- VISTA MOVIMIENTOS -->
    <div id="vista-movimientos" class="oculta">
      <section class="top-bar">
        <h1>Gestión de Movimientos</h1>
      </section>

      <section class="card-form-container">
        <form id="formulario-movimientos" class="card-form">
          <div class="form-row">
            <div class="form-group" style="flex: 2;">
              <label for="mov-producto">Seleccionar Producto *</label>
              <select id="mov-producto" required>
                <option value="">Seleccione un producto...</option>
              </select>
              <div id="mov-stock-info" style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem; min-height: 1.2rem;"></div>
            </div>
            <div class="form-group" style="flex: 1;">
              <label for="mov-cantidad">Cantidad *</label>
              <input type="number" id="mov-cantidad" min="1" required placeholder="Ej: 10" />
            </div>
          </div>
          
          <div class="form-actions" style="justify-content: flex-start; gap: 1rem; margin-top: 1rem;">
            <button type="button" id="btn-entrada" class="btn-success">🔼 Registrar Entrada</button>
            <button type="button" id="btn-salida" class="btn-danger">🔽 Registrar Salida</button>
          </div>
        </form>
      </section>

      <section class="table-container" style="margin-top: 2rem;">
        <h2>Historial de Movimientos</h2>
        <table style="margin-top: 1rem;">
          <thead>
            <tr>
              <th>Fecha y Hora</th>
              <th>Producto</th>
              <th>Movimiento</th>
              <th>Cantidad</th>
            </tr>
          </thead>
          <tbody id="tabla-movimientos">
            <tr>
              <td colspan="4" class="estado-tabla">
                Cargando historial...
              </td>
            </tr>
          </tbody>
        </table>
      </section>
    </div> <!-- Fin vista movimientos -->
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
